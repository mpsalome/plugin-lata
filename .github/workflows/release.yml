name: Build & Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Extract version from pom
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build with Maven
        run: mvn clean package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RogueLata ${{ env.VERSION }}
          body: |
            ## RogueLata ${{ env.VERSION }}

            Baixe o JAR abaixo e coloque em `plugins/` do seu servidor Paper 1.21.4+.
          files: target/RogueLata-${{ env.VERSION }}.jar
