name: RogueLata
version: '${project.version}'
main: com.project.rpgplugin.RPGPlugin
api-version: '1.21'
author: Developer
description: Plugin roguelike com draft 1-de-3, modificadores Mayhem cumulativos, dificuldade escalada, recall por distancia e suporte a AuraSkills/AuraMobs. Paper 1.21.4+.
softdepend:
  - AuraSkills
  - AuraMobs
  - MythicMobs
  - ModelEngine
commands:
  skills:
    description: Abre o menu visual de selecao de habilidades.
    usage: /skills
  rpg:
    description: Comando principal do RogueLata.
    usage: /rpg [reload|reset|debug]
  run:
    description: Mostra informacoes da run atual.
    usage: /run
  recall:
    description: Usa o Recall para teleportar ao spawn.
    usage: /recall
  lata:
    description: Comando principal do RogueLata (co-op, bosses, loja, draft).
    usage: /lata [tp <jogador>|boss spawn <frostmaw|tyrant>|loja|draft]
    aliases: [rogue, pao, roguelata]
  rogue:
    description: Sinonimo de /lata.
    usage: /rogue [tp <jogador>|boss spawn <frostmaw|tyrant>|loja|draft]
    aliases: [lata, pao, roguelata]
permissions:
  rpg.admin:
    description: Permite recarregar/resetar o plugin RogueLata.
    default: op
