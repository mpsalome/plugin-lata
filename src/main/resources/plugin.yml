name: RogueLata
version: '${project.version}'
main: com.project.rpgplugin.RPGPlugin
api-version: '1.21'
author: Developer
description: Plugin action RPG com draft de cartas, modificadores Mayhem, bosses tematicos, dificuldade escalada e consequencia por morte. Paper 1.21.4+.
softdepend:
  - AuraSkills
  - AuraMobs
  - MythicMobs
  - ModelEngine
  - PlaceholderAPI
commands:
  skills:
    description: Abre o menu visual de selecao de habilidades.
    usage: /skills
  rpg:
    description: Comando principal do RogueLata.
    usage: /rpg [reload|reset|debug]
  recall:
    description: Usa o Recall para teleportar ao spawn.
    usage: /recall
  lata:
    description: Comando principal do RogueLata (co-op, bosses, loja, draft).
    usage: /lata [tp <jogador>|boss spawn <id>|loja|draft|info]
    aliases: [rogue, pao, roguelata]
  rogue:
    description: Sinonimo de /lata.
    usage: /rogue [tp <jogador>|boss spawn <id>|loja|draft|info]
    aliases: [lata, pao, roguelata]
permissions:
  rpg.admin:
    description: Permite recarregar/resetar o plugin RogueLata.
    default: op
